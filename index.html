<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://i.ibb.co.com/KxwRNy52/images.jpg') center/cover no-repeat fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(20,20,20,0.45);
    backdrop-filter: blur(6px);
}

/* container */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    padding: 20px;
}

/* BIGGER CARD */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.35);
    padding: 45px;
    border-radius: 25px;
    width: 100%;
    max-width: 420px;
    margin: auto;
}

/* text */
h1 {
    font-size: 30px;
    margin-bottom: 10px;
}

.sub {
    font-size: 20px;
    margin-bottom: 25px;
}

/* buttons */
button {
    margin-top: 12px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #d9d9d9, #a6a6a6);
    color: black;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}

/* subtle sound button */
.sound-btn {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
    cursor: pointer;
}

/* toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    z-index: 10;
}

/* video */
.video-box {
    margin-top: 15px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body onclick="enableSound()">

<div class="container">

    <div class="card">
        <h1>Eid Mubarak</h1>
        <div class="sub">Please Send Salami</div>

        <button onclick="sendBkash()">Send via bKash</button>
        <button onclick="sendNagad()">Send via Nagad</button>

        <div class="sound-btn" onclick="enableSound(event)">
            Tap anywhere for sound
        </div>
    </div>

    <!-- VIDEO -->
    <div class="video-box">
        <div style="position:relative; width:100%; padding-bottom:56%;">
            <iframe 
                id="videoFrame"
                src="https://streamable.com/e/2evrhf?autoplay=1&muted=1"
                frameborder="0"
                allow="autoplay; fullscreen"
                allowfullscreen
                style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:15px;">
            </iframe>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const number = "01840484433";
let soundOn = false;

/* toast */
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2500);
}

/* enable sound */
function enableSound(e){
    if(e) e.stopPropagation();

    if(!soundOn){
        let frame = document.getElementById("videoFrame");
        frame.src = "https://streamable.com/e/2evrhf?autoplay=1"; // remove muted
        soundOn = true;
        showToast("Sound enabled");
    }
}

/* bkash */
function sendBkash(){
    enableSound();

    if (navigator.vibrate) navigator.vibrate(120);

    navigator.clipboard.writeText(number);
    showToast("bKash number copied");

    window.location.href = "bkash://";

    setTimeout(() => {
        showToast("Paste & send to " + number);
    }, 1200);
}

/* nagad */
function sendNagad(){
    enableSound();

    if (navigator.vibrate) navigator.vibrate(120);

    navigator.clipboard.writeText(number);
    showToast("Nagad number copied");

    setTimeout(() => {
        showToast("Open Nagad & paste number");
    }, 1000);
}
</script>

</body>
</html>
