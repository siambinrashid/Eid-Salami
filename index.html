<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak 😏</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #111, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Glow */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: gold;
    filter: blur(180px);
    top: -100px;
}

/* Card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,215,0,0.2);
    z-index: 2;
}

/* Name */
h2 {
    margin: 10px 0;
    color: gold;
}

/* Eid text */
.eid {
    font-size: 20px;
    margin-bottom: 10px;
}

/* Button */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* QR */
.qr {
    width: 180px;
    margin-top: 15px;
    border-radius: 12px;
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: black;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid gold;
    text-align: center;
    transition: 0.3s;
    z-index: 5;
}

.popup.active {
    transform: translate(-50%, -50%) scale(1);
}

/* Money animation */
.money {
    position: absolute;
    color: gold;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    animation: confetti 5s linear infinite;
}

@keyframes confetti {
    0% { transform: translateY(-100px) rotate(0); }
    100% { transform: translateY(100vh) rotate(720deg); }
}

</style>
</head>

<body>

<div class="card">

    <h2>Siam Bin Rashid 😏</h2>

    <div class="eid">🌙 Eid Mubarak ✨</div>
    <p>Send Salami Please 💸</p>

    <button onclick="showPopup()">💸 Send Here</button>

    <img src="YOUR_QR_IMAGE_HERE" class="qr">

    <button onclick="playMusic()">🎵 Play Vibe</button>

</div>

<div class="popup" id="popup">
    <h3>bKash Number</h3>
    <p id="number">01840484433</p>
    <button onclick="copyNumber()">Copy</button>
</div>

<script>
function showPopup() {
    document.getElementById("popup").classList.add("active");
}

function copyNumber() {
    navigator.clipboard.writeText("01840484433");
    alert("Copied 😏");
}

/* Money rain */
for(let i=0;i<20;i++){
    let m = document.createElement("div");
    m.className="money";
    m.innerText="💸";
    m.style.left = Math.random()*100 + "vw";
    m.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(m);
}

/* Confetti */
for(let i=0;i<30;i++){
    let c = document.createElement("div");
    c.className="confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(c);
}

/* Music */
function playMusic(){
    window.open("https://www.youtube.com/watch?v=xpVfcZ0ZcFM", "_blank");
}
</script>

</body>
</html>
